<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HOME PEA — Swing Radar</title>
<meta name="theme-color" content="#0a0a12">
<script src="chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a12;--s1:#12121c;--s2:#1a1a28;--border:#252538;--text:#f0f0f8;--text2:#8888a8;--text3:#555570;--green:#00e07a;--red:#ff4466;--blue:#4d9eff;--gold:#ffb830;--purple:#9d7dff}
html,body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100%;overflow-x:hidden}
.header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.header h1{font-size:16px;font-weight:800;letter-spacing:1px;flex:1}
.header .ver{font-size:9px;color:var(--text3)}
.cards{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cards::-webkit-scrollbar{display:none}
.card{flex-shrink:0;width:130px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:10px 12px;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--blue)}
.card.active{border-color:var(--blue);background:var(--s2)}
.card-ticker{font-size:14px;font-weight:800;color:var(--blue)}
.card-name{font-size:9px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-price{font-size:15px;font-weight:700;margin-top:6px;font-family:'Courier New',monospace}
.card-chg{font-size:11px;font-weight:600;margin-top:2px}
.card-signal{position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%}
.card-risk{font-size:8px;font-weight:700;letter-spacing:.5px;margin-top:4px;opacity:.7}
.signal-banner{margin:12px 16px;padding:14px 16px;border-radius:12px;display:flex;align-items:center;gap:12px}
.signal-banner .emoji{font-size:28px}
.signal-banner .label{font-size:18px;font-weight:900}
.signal-banner .reason{font-size:11px;font-weight:400;color:var(--text2);margin-top:2px}
.signal-buy{background:#00e07a15;border:1px solid #00e07a33;color:var(--green)}
.signal-sell{background:#ff446615;border:1px solid #ff446633;color:var(--red)}
.signal-wait{background:#ffb83015;border:1px solid #ffb83033;color:var(--gold)}
.signal-loading{background:var(--s1);border:1px solid var(--border);color:var(--text3)}
.info-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin:12px 16px;background:var(--border);border-radius:10px;overflow:hidden}
.info-item{background:var(--s1);padding:10px 8px;text-align:center}
.info-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.info-val{font-size:16px;font-weight:800;font-family:'Courier New',monospace}
.info-sub{font-size:9px;color:var(--text3);margin-top:2px}
.chart-wrap{margin:12px 16px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px}
.chart-tabs{display:flex;gap:6px;margin-bottom:10px}
.chart-tab{padding:5px 12px;border-radius:16px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text3);transition:all .2s}
.chart-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chart-canvas{width:100%;height:250px}
.rsi-canvas{width:100%;height:80px;margin-top:8px}
.details{margin:12px 16px}
.detail-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.detail-hd{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.detail-row .lbl{color:var(--text2)}
.detail-row .val{font-weight:700;font-family:'Courier New',monospace}
.support-line{display:flex;align-items:center;gap:8px;margin-top:6px}
.support-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;position:relative;overflow:visible}
.support-fill{height:100%;border-radius:3px;position:absolute;left:0;width:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red))}
.support-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:-1px;background:var(--blue);border:2px solid var(--bg)}
.footer{padding:16px;font-size:10px;color:var(--text3);text-align:center}
</style>
</head>
<body>
<div class="header"><h1>📡 Swing Radar</h1><span class="ver">v2.0 — HOME PEA</span></div>
<div class="cards" id="cards"></div>
<div id="signal" class="signal-banner signal-loading"><div class="emoji">⏳</div><div><div class="label">Chargement...</div><div class="reason">Récupération des cours</div></div></div>
<div class="info-bar"><div class="info-item"><div class="info-label">RSI 14</div><div class="info-val" id="v-rsi">—</div><div class="info-sub" id="v-rsi-txt">—</div></div><div class="info-item"><div class="info-label">MA20</div><div class="info-val" id="v-ma20">—</div><div class="info-sub" id="v-ma20-txt">—</div></div><div class="info-item"><div class="info-label">Support</div><div class="info-val" id="v-sup">—</div><div class="info-sub" id="v-sup-txt">—</div></div></div>
<div class="chart-wrap">
<div class="chart-tabs"><div class="chart-tab active" onclick="setRange('3mo',this)">3M</div><div class="chart-tab" onclick="setRange('6mo',this)">6M</div><div class="chart-tab" onclick="setRange('1y',this)">1A</div></div>
<canvas id="main-chart" class="chart-canvas"></canvas>
<canvas id="rsi-chart" class="rsi-canvas"></canvas>
</div>
<div class="details" id="details"></div>
<div class="footer">Swing Radar v2.0 — HOME PEA • Yahoo Finance (~15min) • Vérifier sur Saxo avant d'acheter</div>

<script>
var watchlist=[
{ticker:'TFI.PA',symbol:'TFI',name:'TF1 Group',sector:'Médias/TV',zone:'🇫🇷',isin:'FR0000054900',risk:'🟢',riskLbl:'Faible'},
{ticker:'GRE.PA',symbol:'GRE',name:'Amundi MSCI Greece',sector:'Économie grecque',zone:'🇬🇷',isin:'FR0010405431',risk:'🟡',riskLbl:'Moyen'},
{ticker:'PASI.PA',symbol:'PASI',name:'MSCI China ESG',sector:'Tech/Finance CN',zone:'🇨🇳',isin:'FR0011871078',risk:'🟡',riskLbl:'Moyen'},
{ticker:'LOCAL.PA',symbol:'LOCAL',name:'Solocal Group',sector:'Digital/IA',zone:'🇫🇷',isin:'FR001400SA10',risk:'🟡',riskLbl:'Moyen'},
{ticker:'S30.PA',symbol:'S30',name:'Solutions 30',sector:'Tech/Fibre/5G',zone:'🇫🇷',isin:'LU1721129249',risk:'🔴',riskLbl:'Élevé'},
{ticker:'ALGID.PA',symbol:'ALGID',name:'Egide SA',sector:'Défense/Élec',zone:'🇫🇷',isin:'FR0000072373',risk:'🔴',riskLbl:'Élevé'},
{ticker:'MEMS.PA',symbol:'MEMS',name:'Memscap SA',sector:'Semi-conducteurs',zone:'🇫🇷',isin:'FR0010298620',risk:'🔴',riskLbl:'Élevé'}
];
var selected=0,currentRange='3mo',chartInst=null,rsiChartInst=null,cache={};

async function fetchData(ticker,range){
var key=ticker+'_'+range;if(cache[key])return cache[key];
var urls=['https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range='+range,'https://corsproxy.io/?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range='+range)];
for(var u=0;u<urls.length;u++){try{var r=await fetch(urls[u]);var j=await r.json();if(j.chart&&j.chart.result){var res=j.chart.result[0],ts=res.timestamp||[],cl=res.indicators.quote[0].close||[],hi=res.indicators.quote[0].high||[],lo=res.indicators.quote[0].low||[],data=[];
for(var i=0;i<ts.length;i++){if(cl[i]!=null)data.push({date:new Date(ts[i]*1000),close:cl[i],high:hi[i]||cl[i],low:lo[i]||cl[i]});}
var m=res.meta||{};cache[key]={data:data,price:m.regularMarketPrice||0,prev:m.chartPreviousClose||m.previousClose||0};return cache[key];}}catch(e){continue;}}return null;}

function calcMA(d,p){if(d.length<p)return null;var s=0;for(var i=d.length-p;i<d.length;i++)s+=d[i].close;return s/p;}
function calcRSI(d,p){if(d.length<p+1)return null;var g=0,l=0;for(var i=d.length-p;i<d.length;i++){var c=d[i].close-d[i-1].close;if(c>0)g+=c;else l+=Math.abs(c);}var ag=g/p,al=l/p;if(al===0)return 100;return 100-(100/(1+ag/al));}
function calcRSISeries(d,p){var s=[];for(var i=p;i<d.length;i++)s.push(calcRSI(d.slice(0,i+1),p));return s;}
function calcSupRes(d){if(d.length<10)return{support:0,resistance:0};var sl=d.slice(-60),lo=sl.map(function(x){return x.low}).sort(function(a,b){return a-b}),hi=sl.map(function(x){return x.high}).sort(function(a,b){return a-b});var n=Math.max(3,Math.floor(lo.length*.2));return{support:parseFloat((lo.slice(0,n).reduce(function(a,b){return a+b},0)/n).toFixed(3)),resistance:parseFloat((hi.slice(-n).reduce(function(a,b){return a+b},0)/n).toFixed(3))};}

function getSignal(rsi,price,ma20,sup,res){var score=0,reasons=[];
if(rsi!=null){if(rsi<30){score+=2;reasons.push('RSI < 30 (survendu)');}else if(rsi<40){score+=1;reasons.push('RSI bas');}else if(rsi>70){score-=2;reasons.push('RSI > 70 (suracheté)');}else if(rsi>60){score-=1;reasons.push('RSI haut');}}
if(ma20!=null&&price>0){if(price>ma20){score+=1;reasons.push('Prix > MA20 ↑');}else{score-=1;reasons.push('Prix < MA20 ↓');}}
if(sup>0&&res>0&&price>0){var rng=res-sup;var pos=(price-sup)/rng;if(pos<.2){score+=1;reasons.push('Proche support');}else if(pos>.8){score-=1;reasons.push('Proche résistance');}}
return{signal:score>=2?'buy':score<=-2?'sell':'wait',score:score,reasons:reasons};}

function buildCards(){var h='';watchlist.forEach(function(w,i){h+='<div class="card'+(i===selected?' active':'')+'" onclick="selectAsset('+i+')"><div class="card-signal" id="sig-'+i+'" style="background:var(--text3)"></div><div class="card-ticker">'+w.symbol+'</div><div class="card-name">'+w.name+'</div><div class="card-price" id="price-'+i+'">—</div><div class="card-chg" id="chg-'+i+'" style="color:var(--text3)">—</div><div class="card-risk">'+w.risk+' '+w.riskLbl+'</div></div>';});document.getElementById('cards').innerHTML=h;}

function selectAsset(i){selected=i;document.querySelectorAll('.card').forEach(function(c,j){c.classList.toggle('active',j===i);});loadAsset();}
function setRange(r,btn){currentRange=r;document.querySelectorAll('.chart-tab').forEach(function(t){t.classList.remove('active');});if(btn)btn.classList.add('active');delete cache[watchlist[selected].ticker+'_'+r];loadAsset();}

async function loadAsset(){
var w=watchlist[selected],sig=document.getElementById('signal');
sig.className='signal-banner signal-loading';sig.innerHTML='<div class="emoji">⏳</div><div><div class="label">'+w.symbol+'...</div><div class="reason">Chargement</div></div>';
var result=await fetchData(w.ticker,currentRange);
if(!result||!result.data.length){sig.innerHTML='<div class="emoji">❌</div><div><div class="label">Erreur</div><div class="reason">Données indisponibles pour '+w.symbol+'</div></div>';return;}
var data=result.data,price=result.price||data[data.length-1].close,prev=result.prev||data[0].close,chg=price-prev,chgP=prev>0?(chg/prev*100):0;
var rsi=calcRSI(data,14),ma20=calcMA(data,20),ma50=calcMA(data,50),sr=calcSupRes(data),signal=getSignal(rsi,price,ma20,sr.support,sr.resistance);
var pe=document.getElementById('price-'+selected),ce=document.getElementById('chg-'+selected);
if(pe)pe.textContent=price.toFixed(3)+'€';if(ce){ce.textContent=(chg>=0?'+':'')+chgP.toFixed(2)+'%';ce.style.color=chg>=0?'var(--green)':'var(--red)';}
var dc={buy:'var(--green)',sell:'var(--red)',wait:'var(--gold)'};document.getElementById('sig-'+selected).style.background=dc[signal.signal];
var bm={buy:{c:'signal-buy',e:'🟢',l:'ACHETER'},sell:{c:'signal-sell',e:'🔴',l:'VENDRE'},wait:{c:'signal-wait',e:'⚪',l:'ATTENDRE'}},b=bm[signal.signal];
sig.className='signal-banner '+b.c;sig.innerHTML='<div class="emoji">'+b.e+'</div><div><div class="label">'+w.symbol+' → '+b.l+'</div><div class="reason">'+signal.reasons.join(' • ')+'</div></div>';
var rc=rsi<30?'var(--green)':rsi>70?'var(--red)':'var(--text)',rt=rsi<30?'Survendu → acheter':rsi>70?'Suracheté → vendre':'Neutre';
document.getElementById('v-rsi').style.color=rc;document.getElementById('v-rsi').textContent=rsi!=null?rsi.toFixed(0):'—';document.getElementById('v-rsi-txt').textContent=rt;
var mc=price>ma20?'var(--green)':'var(--red)',mt=price>ma20?'Prix au-dessus ↑':'Prix en-dessous ↓';
document.getElementById('v-ma20').style.color=mc;document.getElementById('v-ma20').textContent=ma20!=null?ma20.toFixed(3)+'€':'—';document.getElementById('v-ma20-txt').textContent=mt;
document.getElementById('v-sup').textContent=sr.support.toFixed(3)+'€';var sd=price>0?((price-sr.support)/price*100):0;document.getElementById('v-sup-txt').textContent=sd>0?('+'+sd.toFixed(1)+'% du support'):'Au support !';
var posR=(sr.resistance-sr.support)>0?((price-sr.support)/(sr.resistance-sr.support)*100):50;posR=Math.max(0,Math.min(100,posR));
var dH='<div class="detail-card"><div class="detail-hd">'+w.symbol+' — '+w.name+'</div>';
dH+='<div class="detail-row"><span class="lbl">ISIN</span><span class="val" style="font-size:10px;color:var(--text3)">'+w.isin+'</span></div>';
dH+='<div class="detail-row"><span class="lbl">Secteur</span><span class="val" style="font-size:11px">'+w.sector+'</span></div>';
dH+='<div class="detail-row"><span class="lbl">Zone</span><span class="val">'+w.zone+'</span></div>';
dH+='<div class="detail-row"><span class="lbl">Risque</span><span class="val">'+w.risk+' '+w.riskLbl+'</span></div>';
dH+='<div class="detail-row"><span class="lbl">Prix</span><span class="val" style="color:'+(chg>=0?'var(--green)':'var(--red)')+'">'+price.toFixed(3)+'€</span></div>';
dH+='<div class="detail-row"><span class="lbl">MA20 / MA50</span><span class="val" style="color:'+mc+'">'+(ma20?ma20.toFixed(3):'—')+' / '+(ma50?ma50.toFixed(3):'—')+'</span></div>';
dH+='<div class="detail-row"><span class="lbl">RSI</span><span class="val" style="color:'+rc+'">'+(rsi?rsi.toFixed(1):'—')+'</span></div>';
dH+='<div class="detail-row"><span class="lbl">Support → Résistance</span><span class="val"><span style="color:var(--green)">'+sr.support.toFixed(3)+'</span> → <span style="color:var(--red)">'+sr.resistance.toFixed(3)+'</span></span></div>';
dH+='<div class="support-line"><span style="font-size:10px;color:var(--green)">'+sr.support.toFixed(2)+'</span><div class="support-bar"><div class="support-fill"></div><div class="support-dot" style="left:calc('+posR+'% - 4px)"></div></div><span style="font-size:10px;color:var(--red)">'+sr.resistance.toFixed(2)+'</span></div>';
dH+='</div>';document.getElementById('details').innerHTML=dH;
drawMainChart(data,ma20,ma50);drawRSIChart(data);}

function drawMainChart(data){
var cv=document.getElementById('main-chart');if(chartInst)chartInst.destroy();
var lb=data.map(function(d){return d.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}),pr=data.map(function(d){return d.close;});
var m20=data.map(function(_,i){if(i<19)return null;var s=0;for(var j=i-19;j<=i;j++)s+=data[j].close;return s/20;});
var m50=data.map(function(_,i){if(i<49)return null;var s=0;for(var j=i-49;j<=i;j++)s+=data[j].close;return s/50;});
chartInst=new Chart(cv.getContext('2d'),{type:'line',data:{labels:lb,datasets:[
{label:'Prix',data:pr,borderColor:'#4d9eff',backgroundColor:'rgba(77,158,255,0.05)',borderWidth:2,fill:true,tension:.3,pointRadius:0},
{label:'MA20',data:m20,borderColor:'#00e07a',borderWidth:1.5,pointRadius:0,fill:false,tension:.3},
{label:'MA50',data:m50,borderColor:'#ff9800',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false,tension:.3}]},
options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,padding:8,font:{size:10},color:'#8888a8'}},tooltip:{backgroundColor:'#1a1a28',borderColor:'#2a2a3c',borderWidth:1,padding:8,titleColor:'#f0f0f8',bodyColor:'#f0f0f8',callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(3)+'€';}}}},
scales:{x:{grid:{color:'#ffffff08'},ticks:{color:'#555570',font:{size:9},maxTicksLimit:8}},y:{grid:{color:'#ffffff08'},ticks:{color:'#555570',font:{size:10},callback:function(v){return v.toFixed(2)+'€';}}}}}})}

function drawRSIChart(data){
var cv=document.getElementById('rsi-chart');if(rsiChartInst)rsiChartInst.destroy();
var rs=calcRSISeries(data,14),lb=data.slice(14).map(function(d){return d.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});});
rsiChartInst=new Chart(cv.getContext('2d'),{type:'line',data:{labels:lb,datasets:[{label:'RSI',data:rs,borderColor:'#9d7dff',backgroundColor:'rgba(157,125,255,0.08)',borderWidth:1.5,fill:true,tension:.3,pointRadius:0}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a28',borderColor:'#2a2a3c',borderWidth:1,titleColor:'#f0f0f8',bodyColor:'#f0f0f8',callbacks:{label:function(c){return 'RSI: '+c.parsed.y.toFixed(1);}}}},
scales:{x:{display:false},y:{min:0,max:100,grid:{color:'#ffffff08'},ticks:{color:'#555570',font:{size:9},stepSize:10,callback:function(v){return v===30||v===70?v:'';}}}}},
plugins:[{id:'rsiZones',beforeDraw:function(ch){var ctx=ch.ctx,y=ch.scales.y,a=ch.chartArea,y30=y.getPixelForValue(30),y70=y.getPixelForValue(70),y0=y.getPixelForValue(0),y100=y.getPixelForValue(100);
ctx.fillStyle='rgba(0,224,122,0.06)';ctx.fillRect(a.left,y30,a.right-a.left,y0-y30);
ctx.fillStyle='rgba(255,68,102,0.06)';ctx.fillRect(a.left,y100,a.right-a.left,y70-y100);
ctx.strokeStyle='rgba(0,224,122,0.3)';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(a.left,y30);ctx.lineTo(a.right,y30);ctx.stroke();
ctx.strokeStyle='rgba(255,68,102,0.3)';ctx.beginPath();ctx.moveTo(a.left,y70);ctx.lineTo(a.right,y70);ctx.stroke();ctx.setLineDash([]);}}]})}

async function init(){buildCards();
var ps=watchlist.map(function(w,i){return fetchData(w.ticker,'3mo').then(function(r){if(r){var p=r.price||r.data[r.data.length-1].close,pv=r.prev||r.data[0].close,c=pv>0?((p-pv)/pv*100):0;
var pe=document.getElementById('price-'+i);if(pe)pe.textContent=p.toFixed(3)+'€';
var ce=document.getElementById('chg-'+i);if(ce){ce.textContent=(c>=0?'+':'')+c.toFixed(2)+'%';ce.style.color=c>=0?'var(--green)':'var(--red)';}
var rsi=calcRSI(r.data,14),ma20=calcMA(r.data,20),sig=getSignal(rsi,p,ma20,0,0);
var dot=document.getElementById('sig-'+i);if(dot)dot.style.background={buy:'var(--green)',sell:'var(--red)',wait:'var(--gold)'}[sig.signal];}}).catch(function(){});});
await Promise.all(ps);loadAsset();}
init();
</script>
</body>
</html>
